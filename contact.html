        <div class="container">
            <div class="content">
                <h3>Contact Me</h3>
                <p>Please leave me a message, and I will get back to you as soon as possible! &#10047;</p>

                <!--form-->
                <form>
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" placeholder="First Name..">
                
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" placeholder="Last Name..">
                
                    <label for="email">E-mail:</label>
                    <input type="text" id="email" placeholder="email@address.com">

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" placeholder="Write your message here.." style="height: 200px"></textarea>

                    <button type="submit" class="submit-button">Submit</button>
                </form>
                
            </div>
